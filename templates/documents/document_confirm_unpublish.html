{% extends 'base.html' %}

{% block title %}{{ title }} - National Assembly e-Library{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-warning">
                <h4 class="mb-0">
                    <i class="bi bi-arrow-down-circle"></i>
                    {{ title }}
                </h4>
            </div>
            
            <div class="card-body">
                <p class="lead">Are you sure you want to unpublish "{{ document.title }}"?</p>
                
                <div class="alert alert-warning">
                    <i class="bi bi-exclamation-triangle"></i>
                    This action will hide the document from users.
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-arrow-down-circle"></i>
                            Confirm Unpublish
                        </button>
                        <a href="{% url 'documents:document_detail' document.slug %}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i>
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
